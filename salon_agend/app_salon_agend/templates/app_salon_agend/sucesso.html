<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento Realizado!</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: #0b0b0b;
            --surface: #141414;
            --gold: #d4af37;
            --text-main: #f5f5f5;
            --text-muted: #888888;
        }
        body {
            margin: 0; padding: 0;
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; text-align: center;
        }
        .container {
            max-width: 500px; padding: 2rem;
            background-color: var(--surface);
            border-radius: 20px; border: 1px solid #222;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--gold); font-style: italic; margin-bottom: 1rem;
        }
        .icon {
            color: var(--gold); margin-bottom: 1.5rem;
        }
        .btn {
            display: inline-block; margin-top: 2rem;
            padding: 1rem 2rem; background-color: var(--gold);
            color: var(--bg-color); text-decoration: none;
            border-radius: 10px; font-weight: 600; transition: 0.3s;
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3); }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon"><i data-lucide="check-circle" size="64"></i></div>
        <h1>Tudo Pronto, {{ nome }}!</h1>
        <p>Seu agendamento foi realizado com sucesso.</p>
        <p style="color: var(--gold);"><strong>{{ data }} às {{ hora }}</strong></p>
        <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 1rem;">
            Aguardamos você no salão. Se precisar desmarcar, entre em contato.
        </p>
        <a href="{% url 'calendario' %}" class="btn">Voltar para o Início</a>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
